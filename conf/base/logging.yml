version: 1
disable_existing_loggers: false
formatters:
  simple:
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: outputs/pipeline.log
    mode: a
root:
  level: INFO
  handlers: [console, file]
loggers:
  alesc_poc:
    level: INFO
  kedro:
    level: INFO
  pyod:
    level: WARNING
  shap:
    level: WARNING
